# Server Configuration
server.port=5000
spring.application.name=badya-university-event-booking

# Use H2 locally by default; run with -Dspring.profiles.active=prod for MySQL
spring.profiles.active=dev

# Performance: disable OSIV (prevents lazy-loading during HTTP response rendering)
spring.jpa.open-in-view=false

# Static Content
spring.web.resources.static-locations=file:uploads/

# Site settings
app.site.base-url=http://localhost:5000

# CORS — comma-separated allow-list of front-end origins (no wildcard; see CorsConfig).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5000,http://localhost:5500,http://127.0.0.1:5500}

# Logging
logging.level.com.badyauniversity=INFO
logging.level.org.springframework.web=INFO

# Initial admin — set APP_ADMIN_PASSWORD (and APP_ADMIN_EMAIL) in the environment for production.
# The "0000" fallback is for local development only and triggers a startup warning when used.
app.admin.name=${APP_ADMIN_NAME:Admin}
app.admin.email=${APP_ADMIN_EMAIL:admin@gmail.com}
app.admin.password=${APP_ADMIN_PASSWORD:0000}

# Attendance Settings
app.attendance.tokenPepper=badya-secret-pepper-2026
app.attendance.tokenTtlMinutes=15

# --- Signed QR Pass module ---
# HMAC-SHA256 signing key for QR passes. Set QR_SIGNING_SECRET in real environments (a long random value).
app.qrpass.signing-secret=${QR_SIGNING_SECRET:dev-insecure-change-me}
app.qrpass.default-ttl-seconds=86400
app.qrpass.default-max-uses=1
app.qrpass.rate-limit-per-minute=60

# --- Microsoft (Entra ID) "Sign in with Microsoft" — the ONLY login method for the public user site ---
# Provide these via environment variables; the feature stays disabled until client id + secret are set.
app.microsoft.client-id=${MICROSOFT_CLIENT_ID:}
app.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET:}
# Tenant: "common" = multi-tenant + personal accounts (default). Or a tenant GUID / "organizations".
app.microsoft.tenant-id=${MICROSOFT_TENANT_ID:common}
app.microsoft.redirect-uri=${MICROSOFT_REDIRECT_URI:http://localhost:5000/api/auth/microsoft/callback}
# Optional email-domain allow-list (leave blank to allow any verified Microsoft account).
app.microsoft.allowed-email-domain=${MICROSOFT_ALLOWED_EMAIL_DOMAIN:}
# "User.Read" is required to read the profile + photo from Microsoft Graph.
app.microsoft.scopes=openid profile email User.Read
app.microsoft.post-login-redirect=/index.html
