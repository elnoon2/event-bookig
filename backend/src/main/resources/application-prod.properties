# Production Database Configuration (MySQL)
# Values come from environment variables so no credentials are committed.
# On Railway, add a MySQL plugin and set these in the app service's Variables:
#   SPRING_DATASOURCE_URL       jdbc:mysql://${{MySQL.MYSQLHOST}}:${{MySQL.MYSQLPORT}}/${{MySQL.MYSQLDATABASE}}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#   SPRING_DATASOURCE_USERNAME  ${{MySQL.MYSQLUSER}}
#   SPRING_DATASOURCE_PASSWORD  ${{MySQL.MYSQLPASSWORD}}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/badyaunievents?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=false
